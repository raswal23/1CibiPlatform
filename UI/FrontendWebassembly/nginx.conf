server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Blazor WebAssembly framework files (cache aggressively)
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Blazor static web assets from packages/libraries
    location /_content/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Correct MIME type for WebAssembly files
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache compressed assets produced by publish
    location ~* \.(?:br|gz)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # General static file caching
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|eot|ttf|otf|dll|dat|webcil|json)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Required for Blazor WebAssembly client-side routing
    location / {
        try_files $uri /index.html;
    }
}
