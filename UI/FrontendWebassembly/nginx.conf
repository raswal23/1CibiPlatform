server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html to avoid serving stale boot manifest/SRI metadata
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Blazor WebAssembly framework files (must never fall back to index.html)
    location ^~ /_framework/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Blazor static web assets from packages/libraries
    location ^~ /_content/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Correct MIME type for WebAssembly files
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache compressed assets produced by publish
    location ~* \.(?:br|gz)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # General static file caching
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|eot|ttf|otf|dll|dat|webcil|json)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Required for Blazor WebAssembly client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
